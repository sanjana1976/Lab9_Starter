<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      min-height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
      white-space: pre-wrap;
    }

    main {
      width: 800px;
      font-family: system-ui, sans-serif;
    }

    .hint {
      color: #555;
      font-size: 0.9rem;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <h1>Lab 9 &ndash; Error Handling &amp; the Console API</h1>
    <p class="hint">Open your browser's DevTools console (F12) to see the output of each button.</p>

    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" placeholder="first" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" placeholder="second" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <!--
  <script>
    window._trackJs = { token: 'YOUR-TRACKJS-TOKEN-HERE', application: 'lab9' };
  </script>
  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  -->

  <script>
    class CalculatorError extends Error {
      constructor(message) {
        super(message);
        this.name = 'CalculatorError';
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      try {
        if (firstNum === '' || secondNum === '') {
          throw new CalculatorError('Both numbers are required.');
        }
        if (isNaN(firstNum) || isNaN(secondNum)) {
          throw new CalculatorError('Inputs must be numbers.');
        }
        if (operator === '/' && Number(secondNum) === 0) {
          throw new CalculatorError('Cannot divide by zero.');
        }
        output.textContent = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (err) {
        output.textContent = err.message;
        console.error(err);
      } finally {
        console.log('Calculation attempt finished.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    const people = [
      { name: 'Ada Lovelace', role: 'Mathematician', born: 1815 },
      { name: 'Alan Turing', role: 'Computer Scientist', born: 1912 },
      { name: 'Grace Hopper', role: 'Rear Admiral', born: 1906 },
    ];

    const demos = {
      'Console Log'() {
        console.log('Hello from console.log', people);
      },
      'Console Error'() {
        console.error('This is a console.error message');
      },
      'Console Count'() {
        console.count('count');
      },
      'Console Warn'() {
        console.warn('This is a console.warn message');
      },
      'Console Assert'() {
        console.assert(1 === 2, 'Assertion failed: 1 is not 2');
      },
      'Console Clear'() {
        console.clear();
      },
      'Console Dir'() {
        console.dir(document.querySelector('#error-btns'));
      },
      'Console dirxml'() {
        console.dirxml(document.querySelector('main'));
      },
      'Console Group Start'() {
        console.group('Demo Group');
        console.log('Message inside the group');
      },
      'Console Group End'() {
        console.groupEnd();
      },
      'Console Table'() {
        console.table(people);
      },
      'Start Timer'() {
        console.time('timer');
      },
      'End Timer'() {
        console.timeEnd('timer');
      },
      'Console Trace'() {
        console.trace('Trace');
      },
      'Trigger a Global Error'() {
        thisFunctionDoesNotExist();
      },
    };

    errorBtns.forEach(btn => {
      const handler = demos[btn.textContent.trim()];
      if (handler) btn.addEventListener('click', handler);
    });

    window.onerror = (message, source, lineno) => {
      console.log(`Global error caught: "${message}" at ${source}:${lineno}`);
      return false;
    };
  </script>
</body>

</html>
